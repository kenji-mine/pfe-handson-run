name: Clean Trivy Scan V3

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SBOM_PATH: sbom/sbom.json
      SEVERITY: "CRITICAL,HIGH"
      ISSUE_LABELS: "security,trivy,sbom"
      ISSUE_TITLE_PREFIX: "[Trivy][SBOM]"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy (Official Shell Script)
        run: |
          # 公式のインストールスクリプトを使用して最新のバイナリを取得
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.50.1
          # インストール確認
          trivy --version

      - name: Run Trivy Scan
        shell: bash
        run: |
          # 脆弱性が見つかってもジョブを止めないために exit-code 0 を指定
          trivy sbom --format json --output trivy-results.json --severity "${SEVERITY}" --ignore-unfixed --exit-code 0 "${SBOM_PATH}"

      - name: Summarize and Create Issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # ここに以前作成した jq での集計と、gh issue create の処理を繋げてください
          echo "Scan finished. Processing results..."
