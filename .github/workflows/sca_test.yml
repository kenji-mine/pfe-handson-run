name: Trivy SBOM scan (CycloneDX)

on:
  schedule:
    - cron: "0 16 1 * *" 
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SBOM_PATH: sbom/sbom.json
      SEVERITY: "CRITICAL,HIGH"
      ISSUE_LABELS: "security,trivy,sbom"
      ISSUE_TITLE_PREFIX: "[Trivy][SBOM]"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if SBOM does not exist
        id: gate
        shell: bash
        run: |
          if [ ! -f "${SBOM_PATH}" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy SBOM scan
        if: ${{ steps.gate.outputs.found == 'true' }}
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: "sbom"
          scan-ref: "${{ env.SBOM_PATH }}"
          format: "json"
          output: "trivy-results.json"
          severity: "${{ env.SEVERITY }}"
          exit-code: "0"

      - name: Create issue
        if: ${{ steps.gate.outputs.found == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ここに Issue 作成ロジック（前述）
          echo "Scan completed."
