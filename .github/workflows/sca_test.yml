name: Clean Trivy Scan V3

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SBOM_PATH: sbom/sbom.json
      SEVERITY: "CRITICAL,HIGH"
      ISSUE_LABELS: "security,trivy,sbom"
      ISSUE_TITLE_PREFIX: "[Trivy][SBOM]"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy (Linux 64bit)
        run: |
          # バージョンを 0.50.1 に固定してダウンロード
          VERSION="0.50.1"
          wget https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz
          tar zxvf trivy_${VERSION}_Linux-64bit.tar.gz
          # 実行パスの通っている場所に移動
          sudo mv trivy /usr/local/bin/
          # バージョン確認（これでインストール成功を確認）
          trivy --version

      - name: Run Trivy Scan
        # 以前のステップで生成された env を使用
        run: |
          trivy sbom --format json --output trivy-results.json --severity "${SEVERITY}" --ignore-unfixed "${SBOM_PATH}"

      - name: Summarize and Create Issue
        # ここから先は、以前作成した jq を使った集計と gh issue のステップを繋げてください
        if: success()
        run: echo "Scan success, processing results..."
