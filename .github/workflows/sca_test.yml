name: Clean Trivy Scan V3

on:
  workflow_dispatch:

jobs:
  generate-token:
    runs-on: ubuntu-latest
    outputs:
      # 【重要】ここの右辺は [ステップID].outputs.[アクションが定義している出力名]
      app_token: ${{ steps.gen-token-step.outputs.token }}
    steps:
      - name: Generate GitHub App Token
        id: gen-token-step # ← ここにIDを明示的に付けます
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: kenji-mine
          repositories: "test_dashboard"

  call-trivy:
    needs: generate-token # ← これが必須
    uses: kenji-mine/test_dashboard/.github/workflows/trivy-template.yml@main
    with:
      sbom_path: 'sbom/sbom.json'
    secrets:
      # 【最重要】needs.[ジョブ名].outputs.[outputsで定義した名前]
      SUMMARY_REPO_TOKEN: ${{ needs.generate-token.outputs.app_token }}
