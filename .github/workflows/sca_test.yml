name: Clean Trivy Scan V3

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SBOM_PATH: sbom/sbom.json
      SEVERITY: "CRITICAL,HIGH"
      ISSUE_LABELS: "security,trivy,sbom"
      ISSUE_TITLE_PREFIX: "[Trivy][SBOM]"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy (Local User Bin)
        run: |
          # 権限の必要な /usr/local/bin ではなく、ユーザーディレクトリにインストール
          mkdir -p $HOME/.local/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b $HOME/.local/bin v0.50.1
          
          # パスを通す（このステップ内でのみ有効）
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
          # インストール確認（パスが通ったかチェック）
          $HOME/.local/bin/trivy --version

      - name: Run Trivy Scan
        shell: bash
        run: |
          # 上のステップで GITHUB_PATH に追加したので、ここでは直接 trivy と打てます
          trivy sbom --format json --output trivy-results.json --severity "${SEVERITY}" --ignore-unfixed --exit-code 0 "${SBOM_PATH}"

      - name: Summarize and Create Issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "Scan successful. Processing findings..."
          # ここに jq と gh issue の処理を続けてください
