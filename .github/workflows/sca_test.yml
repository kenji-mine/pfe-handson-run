name: Trivy SBOM scan (CycloneDX)

on:
  schedule:
    - cron: "*/5 * * * *" # 毎月1日 01:00 JST 相当（GitHub ActionsのcronはUTC基準） cronは5つのフィールド（分、時、日、月、曜日）で構成
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: trivy-sbom-scan-${{ github.repository }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SBOM_PATH: sbom/sbom.json
      SEVERITY: "CRITICAL,HIGH"
      ISSUE_LABELS: "security,trivy,sbom"
      ISSUE_TITLE_PREFIX: "[Trivy][SBOM]"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if SBOM does not exist
        id: gate
        shell: bash
        run: |
          if [ ! -f "${SBOM_PATH}" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            echo "SBOM not found: ${SBOM_PATH}. Skip scan."
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "SBOM found: ${SBOM_PATH}. Continue."
          fi

      # --- ここにあった手動インストールのステップを削除しました ---
      - name: Run Trivy SBOM scan (JSON output)
        if: ${{ steps.gate.outputs.found == 'true' }}
        id: trivy
        # 'v' を付けない '0.29.0' を使用します
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: "sbom"
          scan-ref: "${{ env.SBOM_PATH }}"
          format: "json"
          output: "trivy-results.json"
          severity: "${{ env.SEVERITY }}"
          ignore-unfixed: true
          exit-code: "0"
          
      - name: Summarize findings
        if: ${{ steps.gate.outputs.found == 'true' }}
        id: summary
        shell: bash
        run: |
          # jqで脆弱性数をカウント
          COUNT=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-results.json)
          echo "count=${COUNT}" >> $GITHUB_OUTPUT

          # 結果をMarkdownテーブル化
          jq -r '
            def safe(x): (x // "" | tostring);
            [
              "### Trivy detected vulnerabilities (from CycloneDX SBOM)",
              "",
              "- SBOM: `'"${SBOM_PATH}"'`",
              "- Severity filter: `'"${SEVERITY}"'`",
              "",
              "| Severity | Pkg | Installed | Fixed | CVE | Title |",
              "|---|---|---:|---:|---|---|",
              (
                .Results[]?.Vulnerabilities[]? |
                [
                  safe(.Severity),
                  safe(.PkgName),
                  safe(.InstalledVersion),
                  safe(.FixedVersion),
                  safe(.VulnerabilityID),
                  safe(.Title)
                ] | @tsv
              )
            ] | .[0:7] + (
              .[7:] | map(split("\t") | "| \(.[0]) | \(.[1]) | \(.[2]) | \(.[3]) | \(.[4]) | \(.[5]) |") | .[0:30]
            ) | join("\n")
          ' trivy-results.json > trivy-summary.md

      - name: Create or update issue if findings exist
        if: ${{ steps.gate.outputs.found == 'true' && steps.summary.outputs.count != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TITLE="${ISSUE_TITLE_PREFIX} ${SEVERITY} found in ${SBOM_PATH}"
          
          # Issue本文の組み立て
          {
            echo "## Summary"
            echo "Trivy found vulnerabilities from CycloneDX SBOM scan."
            echo "- Repository: ${{ github.repository }}"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            cat trivy-summary.md
          } > issue-body.md

          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' || true)

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file issue-body.md
          else
            gh issue create --title "$TITLE" --body-file issue-body.md --label "${ISSUE_LABELS}"
          fi
