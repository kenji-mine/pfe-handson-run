name: Clean Trivy Scan V3

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SBOM_PATH: sbom/sbom.json
      SEVERITY: "CRITICAL,HIGH"
      ISSUE_LABELS: "security,trivy,sbom"
      ISSUE_TITLE_PREFIX: "[Trivy][SBOM]"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy directly
        run: |
          # アクションを使わず、直接バイナリをダウンロードしてインストール
          wget https://github.com/aquasecurity/trivy/releases/download/v0.50.1/trivy_0.50.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

      - name: Run Scan Command
        run: |
          # 直接コマンドを叩く
          trivy sbom --format json --output trivy-results.json ${{ env.SBOM_PATH }}

      - name: Check Results
        run: |
          ls -l trivy-results.json
          cat trivy-results.json | jq .[0:10] # 先頭だけ確認
