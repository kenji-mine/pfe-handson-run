name: Clean Trivy Scan V3

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SBOM_PATH: sbom/sbom.json
      SEVERITY: "CRITICAL,HIGH"
      ISSUE_LABELS: "security,trivy,sbom"
      ISSUE_TITLE_PREFIX: "[Trivy][SBOM]"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # URL を指定せず、公式のセットアップアクションに任せます
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          cache: true

      - name: Run Trivy Scan
        shell: bash
        run: |
          # setup-trivy を使うと、パスが自動で通ります
          trivy sbom --format json --output trivy-results.json --severity "${SEVERITY}" --ignore-unfixed --exit-code 0 "${SBOM_PATH}"

      - name: Check Results
        run: |
          if [ -f trivy-results.json ]; then
            echo "Success: trivy-results.json created."
          else
            echo "Error: Scan failed or file not found."
            exit 1
          fi
